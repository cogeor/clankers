name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # CI is cache-cold across runs (Swatinem/rust-cache caches deps but not
  # incremental fingerprints), so incremental compilation just bloats /target
  # without speedup.
  CARGO_INCREMENTAL: "0"
  # Keeps backtraces useful while ~halving test-binary size — critical on
  # ubuntu-latest runners (~14 GB free) where the workspace previously OOM'd
  # /tmp during the test-binary link step.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Clippy + Test + Doc
    needs: fmt
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      # ubuntu-latest ships with ~14 GB free. Workspace (Bevy + Rapier +
      # ndarray + ort + ~22 example bins built --tests --benches) previously
      # OOM'd /tmp during the test-binary link step. Reclaim ~25 GB by
      # dropping toolchains we don't use. Inline (no third-party action) to
      # keep the supply chain small.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev
      - uses: Swatinem/rust-cache@v2
      # W8 PR3 (loop 09): clippy now scans tests + benches so the
      # `clankers-examples` crate is included in the lint gate. The
      # workspace-wide test step no longer excludes `clankers-examples`;
      # `cargo check --all-targets` precedes the test step so any
      # examples-only compile error surfaces before the test run.
      - run: cargo clippy -j 8 --workspace --all-targets --tests --benches -- -D warnings
      - run: cargo check -j 8 --workspace --all-targets
      - run: cargo test -j 8 --workspace
      - run: cargo doc -j 8 --workspace --no-deps
      # W8 PR1 (loop 07) committed the example-bin LOC ceiling via the
      # xtask. Wire it into CI so future regressions block merge. The
      # xtask walks ~22 files synchronously — no parallelism opportunity,
      # so no `-j` flag.
      - name: Enforce example-bin LOC ceiling
        run: cargo xtask check-bin-size
      # Bench ratio gate. Builds the release CLI, runs a lightweight
      # `bench vec` sweep with `--work-us 100` (representative per-
      # step work), and exits non-zero if the N=8 parallel/sequential
      # throughput ratio falls below 2.0. The gate is hardware-
      # invariant by construction (both arms run on the same runner,
      # in the same process, with the same per-step work budget), so
      # it does NOT depend on the PC1-captured baselines under
      # `notes/baselines/`. The previous absolute-throughput
      # comparator (compare_baseline.py vec_baseline.csv, widened to
      # 0.50 tolerance in loop 01 of this task) is removed — the
      # ratio gate replaces it.
      #
      # Calibration: dev's Windows box reports throughput_x ~4.5 at
      # N=8 with --work-us 100. The 2.0 floor leaves ~2x margin for
      # GHA's 4-core shared runners. If this proves too tight in
      # practice, lower to 1.5 and revisit in a follow-up loop.
      #
      # CLAUDE.md mandates `-j 8` workspace-wide because the paging
      # file cannot absorb higher parallelism during the release
      # build's link step.
      - name: Bench ratio gate
        env:
          RAYON_NUM_THREADS: "8"
        run: |
          cargo build -j 8 -p clankers-app --release
          ./target/release/clankers-app bench vec \
            --envs 1,2,4,8 \
            --runs 3 \
            --warmup-runs 1 \
            --max-steps 500 \
            --work-us 100 \
            --ratio-gate 2.0 \
            --csv benches/current_vec.csv

  # W8 PR3 (loop 09): per-scenario matrix verifying each name in
  # `clankers_sim::scenarios::REGISTRY` is registered. GHA runners have
  # no GPU; `validate --scenario` is registry-lookup-only (PR1 contract)
  # — it does NOT spawn a Bevy App, so this step works on GPU-less
  # runners. If `validate` is extended in a future PR to actually build
  # the App (touching render plugins), the step will need the
  # `bevy_render = []` feature off.
  #
  # Matrix list MUST match REGISTRY verbatim (8 scenarios after loop 08).
  # NOT in REGISTRY (yet): `quadruped_trot` (deferred to a follow-up
  # loop); `domain_rand` (renamed to `domain_rand_pendulum`).
  validate-scenarios:
    name: Validate scenario (${{ matrix.scenario }})
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - arm_bench
          - arm_ik
          - arm_pick
          - arm_two_link
          - cartpole
          - domain_rand_pendulum
          - multi_robot
          - pendulum
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: validate-scenarios
      - name: Build clankers-app (release)
        run: cargo build -j 8 -p clankers-app --release
      - name: Run validate --scenario ${{ matrix.scenario }} --strict
        run: ./target/release/clankers-app validate --scenario ${{ matrix.scenario }} --strict

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-ci.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy --config-file pyproject.toml clankers/
      - name: Run unit tests
        # tests/slow/ houses tests needing heavy optional deps (torch, onnx,
        # mcap). They run in nightly.yml with those deps installed. The
        # `-m "not slow"` filter is belt-and-suspenders for any inline marker.
        run: |
          python -m pytest tests/ --ignore=tests/slow -x -q --timeout=60 -m "not slow"
