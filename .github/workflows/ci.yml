name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Clippy + Test + Doc
    needs: fmt
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -j 8 --workspace --all-targets -- -D warnings
      - run: cargo test -j 8 --workspace --exclude clankers-examples
      - run: cargo doc -j 8 --workspace --no-deps
      # W7 PR4: baseline regression gate. Builds the release CLI,
      # runs a lightweight `bench vec` sweep, and compares against the
      # committed baseline with a 15% slowdown tolerance. The
      # comparator is stdlib-only Python so it does not depend on the
      # `python` job above. CLAUDE.md mandates `-j 8` workspace-wide
      # because the paging file cannot absorb `-j 24` during the
      # release build's link step.
      - name: Bench regression gate
        env:
          RAYON_NUM_THREADS: "8"
        run: |
          cargo build -j 8 -p clankers-app --release
          ./target/release/clankers-app bench vec \
            --envs 1,2,4,8 \
            --runs 3 \
            --warmup-runs 1 \
            --max-steps 500 \
            --csv benches/current_vec.csv
          python scripts/compare_baseline.py \
            benches/current_vec.csv \
            notes/baselines/vec_baseline.csv \
            --tolerance 0.15

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy numpy gymnasium pytest pytest-timeout pydantic
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy --config-file pyproject.toml clankers/
      - name: Run unit tests
        run: |
          python -m pytest tests/ -x -q --timeout=60 -m "not slow"
